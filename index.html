<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; img-src 'self' data: https: file:;" />
  <title>MarkdownLive</title>
  <link rel="stylesheet" href="dist/renderer.bundle.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body spellcheck="true">
  <div id="splash" class="splash visible">
    <div class="splash-card">
      <h1 class="splash-title">MarkdownLive</h1>
      <p class="splash-subtitle">Pick a folder to use as your project root.</p>
      <button id="splash-pick" class="splash-pick-btn">Open folder…</button>
      <div id="splash-recents" class="splash-recents"></div>
    </div>
  </div>

  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Notes</div>
        <button id="new-file-btn" class="icon-btn" title="New note">+</button>
      </div>
      <ul id="file-list" class="file-list"></ul>
      <div class="sidebar-footer">
        <button id="sidebar-collapse" class="icon-btn" title="Collapse notes panel" aria-label="Collapse notes panel">‹</button>
      </div>
    </aside>

    <section class="editor-pane">
      <header class="pane-header">
        <button id="sidebar-expand" class="ghost-btn pane-toggle-btn" title="Expand notes panel" aria-label="Expand notes panel">›</button>
        <input id="title-input" class="title-input" type="text" placeholder="Untitled" />
        <button id="mode-toggle" class="ghost-btn" title="Toggle raw markdown">Raw</button>
        <button id="terminal-toggle" class="ghost-btn" title="Toggle terminal (Cmd+`)">Terminal</button>
        <button id="delete-btn" class="ghost-btn" title="Delete note">Delete</button>
      </header>
      <div id="editor" class="editor-host"></div>
      <div class="status-bar">
        <span id="word-count">0 words</span>
        <span id="save-status">Saved</span>
      </div>
    </section>

    <div id="terminal-divider" class="terminal-divider"></div>

    <section class="terminal-pane">
      <div id="terminal-host" class="terminal-host"></div>
    </section>
  </div>

  <script src="dist/renderer.bundle.js"></script>
</body>
</html>
